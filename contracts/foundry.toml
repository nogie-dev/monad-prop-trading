[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
monad_testnet = "${MONAD_RPC}"
localhost = "http://127.0.0.1:8545"

[etherscan]
monad_testnet = { key = "${MONAD_EXPLORER_KEY}", url = "${MONAD_EXPLORER_API}" }
