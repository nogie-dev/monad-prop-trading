<svg viewBox="0 0 680 1180" xmlns="http://www.w3.org/2000/svg">
<style>
.th { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; }
.ts { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 400; }
.arr { stroke: #b0b0b0; stroke-width: 1.5; }
.label { fill: #b0b0b0; }
.heading { fill: #d3d1c7; }
.c-gray > rect { fill: #3a3a38; stroke: #73726c; }
.c-gray .th, .c-gray .ts { fill: #d3d1c7; }
.c-purple > rect { fill: #3C3489; stroke: #AFA9EC; }
.c-purple .th { fill: #CECBF6; }
.c-purple .ts { fill: #AFA9EC; }
.c-blue > rect { fill: #0C447C; stroke: #85B7EB; }
.c-blue .th { fill: #B5D4F4; }
.c-blue .ts { fill: #85B7EB; }
.c-coral > rect { fill: #712B13; stroke: #F0997B; }
.c-coral .th { fill: #F5C4B3; }
.c-coral .ts { fill: #F0997B; }
.c-red > rect { fill: #791F1F; stroke: #F09595; }
.c-red .th { fill: #F7C1C1; }
.c-red .ts { fill: #F09595; }
.c-teal > rect { fill: #085041; stroke: #5DCAA5; }
.c-teal .th { fill: #9FE1CB; }
.c-teal .ts { fill: #5DCAA5; }
.c-amber > rect { fill: #633806; stroke: #FAC775; }
.c-amber .th { fill: #FAC775; }
.c-amber .ts { fill: #EF9F27; }
</style>

<rect width="680" height="1180" fill="#1a1a1a" rx="0"/>

<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th heading" x="40" y="28">Phase 1 — Evaluation</text>

<g class="c-gray">
<rect x="200" y="46" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="280" y="68" text-anchor="middle" dominant-baseline="central">Player wallet</text>
</g>

<line x1="280" y1="90" x2="280" y2="130" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="288" y="114" text-anchor="start">USDC fee</text>

<g class="c-purple">
<rect x="160" y="130" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="280" y="150" text-anchor="middle" dominant-baseline="central">PropChallenge.sol</text>
<text class="ts" x="280" y="168" text-anchor="middle" dominant-baseline="central">Fee + eval storage</text>
</g>

<line x1="280" y1="186" x2="280" y2="226" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="288" y="210" text-anchor="start">Init eval slot</text>

<g class="c-blue">
<rect x="160" y="226" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="280" y="246" text-anchor="middle" dominant-baseline="central">Web demo trading</text>
<text class="ts" x="280" y="264" text-anchor="middle" dominant-baseline="central">Oracle price feed</text>
</g>

<line x1="280" y1="282" x2="280" y2="322" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="288" y="306" text-anchor="start">On-chain record</text>

<g class="c-coral">
<rect x="160" y="322" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="280" y="342" text-anchor="middle" dominant-baseline="central">Off-chain monitor</text>
<text class="ts" x="280" y="360" text-anchor="middle" dominant-baseline="central">Evaluate P&amp;L</text>
</g>

<path d="M188 378 L100 420" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="104" y="398" text-anchor="start">Below target</text>

<path d="M372 378 L460 420" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="420" y="398" text-anchor="start">Target met</text>

<g class="c-red">
<rect x="40" y="420" width="150" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="115" y="440" text-anchor="middle" dominant-baseline="central">failChallenge()</text>
<text class="ts" x="115" y="458" text-anchor="middle" dominant-baseline="central">No refund</text>
</g>

<g class="c-teal">
<rect x="420" y="420" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="440" text-anchor="middle" dominant-baseline="central">passChallenge()</text>
<text class="ts" x="520" y="458" text-anchor="middle" dominant-baseline="central">Trigger PA deploy</text>
</g>

<line x1="520" y1="476" x2="520" y2="520" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="420" y="520" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="540" text-anchor="middle" dominant-baseline="central">AccountFactory.sol</text>
<text class="ts" x="520" y="558" text-anchor="middle" dominant-baseline="central">deployAccount()</text>
</g>

<line x1="40" y1="610" x2="640" y2="610" stroke="#555" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.5"/>

<text class="th heading" x="40" y="642">Phase 2 — Live trading</text>

<g class="c-gray">
<rect x="240" y="660" width="140" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="310" y="682" text-anchor="middle" dominant-baseline="central">Player wallet</text>
</g>

<g class="c-amber">
<rect x="440" y="660" width="140" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="510" y="682" text-anchor="middle" dominant-baseline="central">Treasury.sol</text>
</g>

<line x1="310" y1="704" x2="310" y2="740" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="318" y="726" text-anchor="start">execute()</text>

<line x1="510" y1="704" x2="510" y2="740" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="518" y="726" text-anchor="start">Fund USDC</text>

<g class="c-purple">
<rect x="230" y="740" width="370" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="760" text-anchor="middle" dominant-baseline="central">TradingAccount.sol (PA)</text>
<text class="ts" x="415" y="778" text-anchor="middle" dominant-baseline="central">execute() with 3-layer whitelist</text>
</g>

<g class="c-coral">
<rect x="50" y="748" width="110" height="40" rx="8" stroke-width="0.5"/>
<text class="ts" x="105" y="768" text-anchor="middle" dominant-baseline="central">Off-chain</text>
</g>

<text class="ts label" x="172" y="752" text-anchor="start">Track PA</text>
<line x1="160" y1="768" x2="228" y2="768" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

<line x1="105" y1="788" x2="105" y2="860" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="113" y="830" text-anchor="start">Below limit</text>

<g class="c-red">
<rect x="40" y="860" width="130" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="105" y="880" text-anchor="middle" dominant-baseline="central">PA.forceClose()</text>
<text class="ts" x="105" y="898" text-anchor="middle" dominant-baseline="central">Funds → Treasury</text>
</g>

<line x1="415" y1="796" x2="415" y2="850" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="423" y="828" text-anchor="start">Swap</text>

<g class="c-gray">
<rect x="290" y="850" width="250" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="872" text-anchor="middle" dominant-baseline="central">DEX (BTC, ETH, SOL)</text>
</g>

<line x1="415" y1="894" x2="415" y2="950" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="423" y="926" text-anchor="start">Profit target met</text>

<g class="c-teal">
<rect x="290" y="950" width="250" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="415" y="970" text-anchor="middle" dominant-baseline="central">PA.settle()</text>
<text class="ts" x="415" y="988" text-anchor="middle" dominant-baseline="central">Split profit from PA</text>
</g>

<path d="M350 1006 L250 1060" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="262" y="1032" text-anchor="start">80% profit</text>

<path d="M480 1006 L580 1060" fill="none" class="arr" marker-end="url(#arrow)"/>
<text class="ts label" x="516" y="1032" text-anchor="start">20% profit</text>

<g class="c-teal">
<rect x="160" y="1060" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="240" y="1082" text-anchor="middle" dominant-baseline="central">Player wallet</text>
</g>

<g class="c-amber">
<rect x="500" y="1060" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="580" y="1082" text-anchor="middle" dominant-baseline="central">Treasury</text>
</g>

</svg>
